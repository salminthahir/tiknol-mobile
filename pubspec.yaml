name: tiknol_reserve_mobile
description: "Titik Nol Coffee Reserve - POS Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.2.1

  # Navigation
  go_router: ^17.1.0

  # Networking
  dio: ^5.9.1

  # Storage
  flutter_secure_storage: ^10.0.0

  # UI
  google_fonts: ^8.0.1
  lucide_icons: ^0.257.0
  cached_network_image: ^3.3.1
  intl: ^0.20.2

  # Utils
  url_launcher: ^6.2.5

  # WebView (in-app payment)
  webview_flutter: ^4.10.0

  # Printer (BLE + Classic Bluetooth + ESC/POS)
  flutter_blue_plus: ^1.35.0
  flutter_bluetooth_serial: ^0.4.0
  esc_pos_utils_plus: ^2.0.4
  permission_handler: ^11.4.0
  shared_preferences: ^2.5.0
  file_picker: ^9.0.0
  image: ^4.5.0

  # QR Code (for QRIS payment)
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/img_8565.jpg
    - assets/images/img_8587.jpg
    - assets/images/space01.png
